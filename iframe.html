<!DOCTYPE html>
<html>

<head>

    <title>Iframe Chat Test</title>

    <style>

        body{

            margin:0;
            padding:0;

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:#0f172a;

            font-family:Arial, sans-serif;
        }

        .iframe-container{

            width:450px;

            height:920px;

            border-radius:35px;

            overflow:hidden;

            box-shadow:0px 0px 40px rgba(0,0,0,0.5);

            background:white;
        }

        iframe{

            width:100%;

            height:100%;

            border:none;
        }

    </style>

</head>

<body>

<div class="iframe-container">

    <iframe

        src="https://groupchat-app-p1yg.onrender.com"

        allow="camera; microphone"

        loading="lazy">

    </iframe>

</div>

</body>
</html>
