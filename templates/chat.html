<!DOCTYPE html>
<html>

<head>

    <title>Chat</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='chat.css') }}">

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

</head>

<body>

<div class="mobile-container" id="container">

    <!-- TOP BAR -->

    <div class="top-bar">

        <!-- LOGOUT -->

        <a href="/dashboard">

            <button class="logout-btn">
                ✖
            </button>

        </a>

        <!-- INVITE BUTTON -->

        {% if is_admin %}

        <button class="invite-btn"
                onclick="openPopup()">
            Invite
        </button>

        {% else %}

        <button class="invite-btn disabled-btn"
                disabled>
            Invite Disabled
        </button>

        {% endif %}

        <!-- THEME -->

        <button class="theme-btn"
                onclick="toggleTheme()"
                id="theme-btn">
            🌙
        </button>

    </div>

    <!-- MESSAGES -->

    <div id="messages" class="messages"></div>

    <!-- CHAT INPUT -->

    <div class="chat-input-area">

        <input type="text"
               id="message"
               placeholder="Type message...">

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<!-- INVITE POPUP -->

<div class="popup" id="popup">

    <div class="popup-content">

        <h3>
            Invite Link
        </h3>

        <input type="text"
               id="invite-link"
               readonly>

        <button onclick="copyInviteLink()">
            Copy Link
        </button>

    </div>

</div>

<!-- SCRIPT -->

<script>

var socket = io();

var username = "{{ username }}";

var room = "{{ room }}";


// ---------------- JOIN ROOM ----------------

socket.emit('join', {

    room: room
});


// ---------------- RECEIVE MESSAGE ----------------

socket.on('message', function(data){

    let messages =
    document.getElementById('messages');

    messages.innerHTML += `

        <div class="message">

            <b>${data.username}</b>

            <p>${data.message}</p>

        </div>
    `;

    messages.scrollTop =
    messages.scrollHeight;
});


// ---------------- SEND MESSAGE ----------------

function sendMessage(){

    let input =
    document.getElementById('message');

    let message = input.value;

    if(message.trim() == ""){

        return;
    }

    socket.send({

        username: username,

        message: message,

        room: room
    });

    input.value = "";
}


// ---------------- ENTER KEY ----------------

document
.getElementById("message")
.addEventListener("keypress", function(e){

    if(e.key === "Enter"){

        sendMessage();
    }
});


// ---------------- OPEN POPUP ----------------

function openPopup(){

    document
    .getElementById("popup")
    .style.display = "flex";

    // generate invite link

    fetch("/generate-invite", {

        method:"POST",

        headers:{
            "Content-Type":
            "application/x-www-form-urlencoded"
        },

        body:`room=${room}`
    })

    .then(res => res.json())

    .then(data => {

        document
        .getElementById("invite-link")
        .value = data.link;
    });
}


// ---------------- COPY LINK ----------------

function copyInviteLink(){

    let input =
    document.getElementById("invite-link");

    input.select();

    input.setSelectionRange(0, 99999);

    navigator.clipboard.writeText(
        input.value
    );

    alert("Invite Link Copied!");

    // close popup

    document
    .getElementById("popup")
    .style.display = "none";
}

</script>

<!-- THEME JS -->

<script src="{{ url_for('static', filename='theme.js') }}"></script>

</body>
</html>
