<!DOCTYPE html>
<html>

<head>

    <title>GroupChat</title>

    <!-- PREVENT THEME FLICKER -->

    <script>

    (function(){

        const savedTheme =
        localStorage.getItem("theme");

        if(savedTheme === "dark"){

            document.documentElement
            .classList.add("dark-theme");
        }

    })();

    </script>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='chat.css') }}">

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

</head>

<body>

<div class="mobile-container"
     id="container">

    <!-- TOP BAR -->

    <div class="top-bar">

        <div class="left-section">

            <a href="/dashboard">

                <button class="logout-btn">✖</button>

            </a>

            {% if is_admin %}

            <button class="invite-btn"
                    onclick="openPopup()">

                Invite

            </button>

            {% endif %}

        </div>

        <div class="right-section">

            <button class="users-btn"
                    onclick="openUsersPopup()">

                👥 <span id="user-count">1</span>

            </button>

            <button class="theme-btn"
                    onclick="toggleTheme()"
                    id="theme-btn">

                🌙

            </button>

        </div>

    </div>

    <!-- CHAT -->

    <div id="messages" class="messages"></div>

    <!-- INPUT -->

    <div class="chat-input-area">

        <input type="text"
               id="message"
               placeholder="Write a message...">

        <button onclick="sendMessage()">Send</button>

    </div>

</div>

<!-- INVITE POPUP -->

<div class="popup" id="popup">

    <div class="popup-content">

        <h3>Invite Link</h3>

        <input type="text"
               id="invite-link"
               readonly
               placeholder="Generating...">

        <button onclick="copyInviteLink()"
                id="copy-btn"
                disabled>

            Copy Link

        </button>

        <div id="copy-success">
            ✓ Link Copied!
        </div>

        <div id="invite-error">
            ✕ Failed to generate. Try closing and reopening.
        </div>

    </div>

</div>

<!-- USERS POPUP -->

<div class="popup" id="users-popup">

    <div class="popup-content">

        <h3>Users In Chat</h3>

        <div id="users-list"></div>

    </div>

</div>

<script>

// ---------------- SOCKET ----------------

var socket = io({
    transports: ["polling", "websocket"]
});

// ---------------- USER INFO ----------------

var username = "{{ username }}";
var room     = "{{ room }}";
var user_id  = "{{ session['user_id'] }}";

// ---------------- JOIN ----------------

socket.emit('join', {
    room:     room,
    username: username,
    user_id:  user_id
});

// ---------------- RECEIVE MESSAGE ----------------

socket.on('message', function(data){

    let messages  = document.getElementById('messages');
    let isMine    = data.user_id === user_id;
    let msgClass  = isMine ? "my-message" : "other-message";

    let nameHTML  = isMine
        ? ""
        : `<div class="sender-name">${data.username}</div>`;

    let deleteBtn = isMine
        ? `<button class="delete-btn"
                   onclick="deleteMessage('${data.id}')">🗑️</button>`
        : "";

    messages.innerHTML += `
        <div class="message-wrapper ${msgClass}" id="${data.id}">
            ${nameHTML}
            <div class="message">
                <div class="message-text">${data.message}</div>
                <div class="message-time">${data.time}</div>
                ${deleteBtn}
            </div>
        </div>
    `;

    messages.scrollTop = messages.scrollHeight;
});

// ---------------- USER STATUS ----------------

socket.on('user_status', function(data){

    let messages = document.getElementById('messages');

    messages.innerHTML += `
        <div class="status-message">${data.message}</div>
    `;

    messages.scrollTop = messages.scrollHeight;
});

// ---------------- SEND MESSAGE ----------------

function sendMessage(){

    let input   = document.getElementById('message');
    let message = input.value.trim();

    if(message === "") return;

    const currentTime = new Date().toLocaleTimeString([], {
        hour:   '2-digit',
        minute: '2-digit'
    });

    socket.emit('message', {
        id:       crypto.randomUUID(),
        user_id:  user_id,
        username: username,
        message:  message,
        time:     currentTime,
        room:     room
    });

    input.value = "";
}

// ---------------- DELETE ----------------

function deleteMessage(id){
    socket.emit('delete_message', { id: id, room: room });
}

socket.on('delete_message', function(data){
    let msg = document.getElementById(data.id);
    if(msg) msg.remove();
});

// ---------------- UPDATE USERS ----------------

socket.on('update_users', function(data){

    document.getElementById("user-count").innerText = data.count;

    let usersList = document.getElementById("users-list");
    usersList.innerHTML = "";

    data.users.forEach(user => {

        let div = document.createElement("div");
        div.classList.add("user-item");

        div.innerHTML = user.admin
            ? `${user.username}<span class="admin-tag">Admin</span>`
            : user.username;

        usersList.appendChild(div);
    });
});

// ---------------- ENTER KEY ----------------

document.getElementById("message")
.addEventListener("keypress", function(e){
    if(e.key === "Enter") sendMessage();
});

// ---------------- INVITE HELPERS ----------------

function setInviteLoading(){
    document.getElementById("invite-link").value = "";
    document.getElementById("invite-link").placeholder = "Generating...";
    document.getElementById("copy-btn").disabled = true;
    document.getElementById("copy-btn").style.opacity = "0.5";
    document.getElementById("copy-success").style.display = "none";
    document.getElementById("invite-error").style.display = "none";
}

function setInviteSuccess(link){
    document.getElementById("invite-link").value = link;
    document.getElementById("invite-link").placeholder = "";
    document.getElementById("copy-btn").disabled = false;
    document.getElementById("copy-btn").style.opacity = "1";
    document.getElementById("invite-error").style.display = "none";
}

function setInviteError(){
    document.getElementById("invite-link").value = "";
    document.getElementById("invite-link").placeholder = "Could not generate link";
    document.getElementById("copy-btn").disabled = true;
    document.getElementById("copy-btn").style.opacity = "0.5";
    document.getElementById("invite-error").style.display = "block";
}

// ---------------- OPEN INVITE ----------------

function openPopup(){

    document.getElementById("popup").style.display = "flex";

    setInviteLoading();

    fetch("/generate-invite", {
        method:      "POST",
        credentials: "same-origin",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "room=" + encodeURIComponent(room)
    })
    .then(function(res){
        // parse JSON regardless of status code
        return res.json().then(function(data){
            return { status: res.status, data: data };
        });
    })
    .then(function(result){

        if(result.status !== 200 || result.data.error || !result.data.link){
            console.error("Invite error:", result.data.error || "No link");
            setInviteError();
            return;
        }

        setInviteSuccess(result.data.link);
    })
    .catch(function(err){
        console.error("Fetch failed:", err);
        setInviteError();
    });
}

// ---------------- COPY LINK ----------------

function copyInviteLink(){

    let input = document.getElementById("invite-link");

    if(!input.value.trim()) return;

    navigator.clipboard.writeText(input.value)
    .then(function(){
        showCopied();
    })
    .catch(function(){
        // fallback
        input.select();
        document.execCommand("copy");
        showCopied();
    });
}

function showCopied(){
    let s = document.getElementById("copy-success");
    s.style.display = "block";
    setTimeout(function(){ s.style.display = "none"; }, 2000);
}

// ---------------- USERS POPUP ----------------

function openUsersPopup(){
    document.getElementById("users-popup").style.display = "flex";
}

// ---------------- CLOSE POPUPS ----------------

window.onclick = function(e){

    let popup      = document.getElementById("popup");
    let usersPopup = document.getElementById("users-popup");

    if(e.target === popup)      popup.style.display      = "none";
    if(e.target === usersPopup) usersPopup.style.display = "none";
};

</script>

<script src="{{ url_for('static', filename='theme.js') }}"></script>

</body>
</html>
