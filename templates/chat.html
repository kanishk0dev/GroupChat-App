<!DOCTYPE html>
<html>

<head>

    <title>GroupChat</title>

    <!-- PREVENT THEME FLICKER -->

    <script>

    (function(){

        const savedTheme =
        localStorage.getItem("theme");

        if(savedTheme === "dark"){

            document.documentElement
            .classList.add("dark-theme");
        }

    })();

    </script>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='chat.css') }}">

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

</head>

<body>

<div class="mobile-container"
     id="container">

    <!-- TOP BAR -->

    <div class="top-bar">

        <div class="left-section">

            <!-- BACK -->

            <a href="/dashboard">

                <button class="logout-btn">

                    ✖

                </button>

            </a>

            <!-- INVITE -->

            {% if is_admin %}

            <button class="invite-btn"
                    onclick="openPopup()">

                Invite

            </button>

            {% endif %}

        </div>

        <div class="right-section">

            <!-- USERS -->

            <button class="users-btn"
                    onclick="openUsersPopup()">

                👥

                <span id="user-count">
                    1
                </span>

            </button>

            <!-- THEME -->

            <button class="theme-btn"
                    onclick="toggleTheme()"
                    id="theme-btn">

                🌙

            </button>

        </div>

    </div>

    <!-- CHAT -->

    <div id="messages"
         class="messages"></div>

    <!-- INPUT -->

    <div class="chat-input-area">

        <input type="text"
               id="message"
               placeholder="Write a message...">

        <button onclick="sendMessage()">

            Send

        </button>

    </div>

</div>

<!-- INVITE POPUP -->

<div class="popup"
     id="popup">

    <div class="popup-content">

        <h3>
            Invite Link
        </h3>

        <input type="text"
               id="invite-link"
               readonly>

        <button onclick="copyInviteLink()">

            Copy Link

        </button>

        <div id="copy-success">

            Link Copied Successfully

        </div>

    </div>

</div>

<!-- USERS POPUP -->

<div class="popup"
     id="users-popup">

    <div class="popup-content">

        <h3>
            Users In Chat
        </h3>

        <div id="users-list"></div>

    </div>

</div>

<script>

// ---------------- SOCKET ----------------

var socket = io({

    transports: ["polling", "websocket"]
});


// ---------------- USER INFO ----------------

var username = "{{ username }}";

var room = "{{ room }}";

var user_id = "{{ session['user_id'] }}";


// ---------------- JOIN ----------------

socket.emit('join', {

    room: room,

    username: username,

    user_id: user_id
});


// ---------------- RECEIVE MESSAGE ----------------

socket.on('message', function(data){

    let messages =
    document.getElementById('messages');

    let isMine =
    data.user_id === user_id;

    let messageClass =
    isMine ? "my-message" : "other-message";

    /* sender name — only for others */

    let nameHTML =
    isMine
    ? ""
    : `<div class="sender-name">${data.username}</div>`;

    /* delete button — only for mine */

    let deleteButton =
    isMine
    ? `<button class="delete-btn"
               onclick="deleteMessage('${data.id}')">🗑️</button>`
    : "";

    /* FIX: delete btn now sits outside .message,
       as a sibling so it doesn't push text content */

    messages.innerHTML += `

        <div class="message-wrapper ${messageClass}"
             id="${data.id}">

            ${nameHTML}

            <div class="message">

                <div class="message-text">${data.message}</div>

                <div class="message-time">${data.time}</div>

                ${deleteButton}

            </div>

        </div>
    `;

    messages.scrollTop =
    messages.scrollHeight;
});


// ---------------- USER STATUS ----------------

socket.on('user_status', function(data){

    let messages =
    document.getElementById('messages');

    messages.innerHTML += `

        <div class="status-message">

            ${data.message}

        </div>
    `;

    messages.scrollTop =
    messages.scrollHeight;
});


// ---------------- SEND MESSAGE ----------------

function sendMessage(){

    let input =
    document.getElementById('message');

    let message =
    input.value.trim();

    if(message === ""){

        return;
    }

    const currentTime =
    new Date().toLocaleTimeString([], {

        hour: '2-digit',

        minute: '2-digit'
    });

    socket.emit('message', {

        id: crypto.randomUUID(),

        user_id: user_id,

        username: username,

        message: message,

        time: currentTime,

        room: room
    });

    input.value = "";
}


// ---------------- DELETE ----------------

function deleteMessage(id){

    socket.emit('delete_message', {

        id:id,

        room:room
    });
}


// ---------------- RECEIVE DELETE ----------------

socket.on('delete_message', function(data){

    let msg =
    document.getElementById(data.id);

    if(msg){

        msg.remove();
    }
});


// ---------------- UPDATE USERS ----------------

socket.on('update_users', function(data){

    document
    .getElementById("user-count")
    .innerText = data.count;

    let usersList =
    document.getElementById("users-list");

    usersList.innerHTML = "";

    data.users.forEach(user => {

        let div =
        document.createElement("div");

        div.classList.add("user-item");

        if(user.admin){

            div.innerHTML = `
                ${user.username}

                <span class="admin-tag">

                    Admin

                </span>
            `;
        }

        else{

            div.innerHTML =
            user.username;
        }

        usersList.appendChild(div);
    });
});


// ---------------- ENTER KEY ----------------

document
.getElementById("message")
.addEventListener("keypress", function(e){

    if(e.key === "Enter"){

        sendMessage();
    }
});


// ---------------- OPEN INVITE ----------------

function openPopup(){

    document
    .getElementById("popup")
    .style.display = "flex";

    fetch("/generate-invite", {

        method:"POST",

        headers:{
            "Content-Type":
            "application/x-www-form-urlencoded"
        },

        body:`room=${room}`
    })

    .then(res => res.json())

    .then(data => {

        document
        .getElementById("invite-link")
        .value = data.link;
    });
}


// ---------------- COPY LINK ----------------

function copyInviteLink(){

    let input =
    document.getElementById("invite-link");

    input.select();

    navigator.clipboard.writeText(
        input.value
    );

    document
    .getElementById("copy-success")
    .style.display = "block";

    setTimeout(() => {

        document
        .getElementById("copy-success")
        .style.display = "none";

    }, 2000);
}


// ---------------- USERS POPUP ----------------

function openUsersPopup(){

    document
    .getElementById("users-popup")
    .style.display = "flex";
}


// ---------------- CLOSE POPUPS ----------------

window.onclick = function(e){

    let popup =
    document.getElementById("popup");

    let usersPopup =
    document.getElementById("users-popup");

    if(e.target == popup){

        popup.style.display = "none";
    }

    if(e.target == usersPopup){

        usersPopup.style.display = "none";
    }
};

</script>

<script src="{{ url_for('static', filename='theme.js') }}"></script>

</body>
</html>
