<!DOCTYPE html>
<html>

<head>

    <title>GroupChat</title>

    <!-- PREVENT THEME FLICKER -->

    <script>

    (function(){

        const savedTheme =
        localStorage.getItem("theme");

        if(savedTheme === "dark"){

            document.documentElement
            .classList.add("dark-theme");
        }

    })();

    </script>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='login.css') }}">

</head>

<body>

<div class="mobile-container"
     id="container">

    <!-- THEME BUTTON -->

    <button class="theme-btn"
            id="theme-btn"
            onclick="toggleTheme()">

        🌙

    </button>

    <!-- LOGIN BOX -->

    <div class="login-box">

        <h1>
            WELCOME
        </h1>

        <p>
            Enter your name to continue
        </p>

        <form action="/login"
              method="POST">

            <!-- USERNAME -->

            <input type="text"
                   name="username"
                   id="username"
                   placeholder="Enter your name"
                   required>

            <!-- INVITE ROOM -->

            <input type="hidden"
                   name="invite_room"
                   value="{{ invite_room }}">

            <!-- BUTTON -->

            <button type="submit">

                Proceed

            </button>

        </form>

    </div>

</div>

<script>

// ---------------- ENTER KEY ----------------

document
.getElementById("username")
.addEventListener("keypress", function(e){

    if(e.key === "Enter"){

        this.form.submit();
    }
});

</script>

<script src="{{ url_for('static', filename='theme.js') }}"></script>

</body>
</html>
