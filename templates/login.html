<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='login.css') }}">

</head>

<body>

<div class="mobile-container" id="container">

    <button class="theme-btn"
            onclick="toggleTheme()"
            id="theme-btn">
        🌙
    </button>

    <div class="login-box">

        <h2>Enter Your Name</h2>

        <form action="/login" method="POST">

            <input type="text"
                   name="username"
                   placeholder="Your Name"
                   required>

            <button type="submit">
                Proceed
            </button>

        </form>

    </div>

</div>

<script src="{{ url_for('static', filename='theme.js') }}"></script>

</body>
</html>
