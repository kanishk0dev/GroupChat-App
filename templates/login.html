<!DOCTYPE html>
<html>

<head>

    <title>GroupChat</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='login.css') }}">

</head>

<body>

<div class="mobile-container"
     id="container">

    <!-- THEME -->

    <button class="theme-btn"
            id="theme-btn"
            onclick="toggleTheme()">

        🌙

    </button>

    <!-- LOGIN -->

    <div class="login-box">

        <h1>
            WELCOME
        </h1>

        <p>
            Enter your name to continue
        </p>

        <form action="/login"
              method="POST">

            <input type="text"
                   name="username"
                   id="username"
                   placeholder="Enter your name"
                   required>

            <button type="submit">

                Proceed

            </button>

        </form>

    </div>

</div>

<script>

document
.getElementById("username")
.addEventListener("keypress", function(e){

    if(e.key === "Enter"){

        this.form.submit();
    }
});

</script>

<script src="{{ url_for('static', filename='theme.js') }}"></script>

</body>
</html>
