<!DOCTYPE html>
<html>

<head>

    <title>GroupChat</title>

    <!-- PREVENT THEME FLICKER -->

    <script>

    (function(){

        const savedTheme =
        localStorage.getItem("theme");

        if(savedTheme === "dark"){

            document.documentElement
            .classList.add("dark-theme");
        }

    })();

    </script>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='dashboard.css') }}">

</head>

<body>

<div class="mobile-container"
     id="container">

    <!-- THEME BUTTON -->

    <button class="theme-btn"
            id="theme-btn"
            onclick="toggleTheme()">

        🌙

    </button>

    <!-- DASHBOARD -->

    <div class="dashboard-box">

        <h1>
            Chat Dashboard
        </h1>

        <p>
            Create a room or join an existing one
        </p>

        <!-- ROOM INPUT -->

        <input type="text"
               id="room-id"
               placeholder="Enter Room ID">

        <!-- GENERATE -->

        <button onclick="generateRoom()">

            Generate Room ID

        </button>

        <!-- JOIN -->

        <button onclick="joinRoom()">

            Join Room

        </button>

    </div>

</div>

<script>

// ---------------- GENERATE ROOM ----------------

function generateRoom(){

    const roomId =
    Math.random()
    .toString(36)
    .substring(2,10);

    document
    .getElementById("room-id")
    .value = roomId;
}


// ---------------- JOIN ROOM ----------------

function joinRoom(){

    const room =
    document
    .getElementById("room-id")
    .value
    .trim();

    if(room !== ""){

        window.location.href =
        `/chat/${room}`;
    }
}


// ---------------- ENTER KEY ----------------

document
.getElementById("room-id")
.addEventListener("keypress", function(e){

    if(e.key === "Enter"){

        joinRoom();
    }
});

</script>

<script src="{{ url_for('static', filename='theme.js') }}"></script>

</body>
</html>
